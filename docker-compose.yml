version: '3.8'

services:
  # MySQL数据库服务
  db:
    image: mysql:8.0
    container_name: coach-ai-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-coach_ai}
      MYSQL_USER: ${DB_USER:-coach_ai_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-coach_ai_password}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./deploy/docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: 
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootpassword}"]
      timeout: 20s
      retries: 10
    networks:
      - coach-ai-network

  # Redis缓存服务
  redis:
    image: redis:7-alpine
    container_name: coach-ai-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispassword}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      timeout: 10s
      retries: 5
    networks:
      - coach-ai-network

  # CoachAI应用服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coach-ai-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_PORT: ${APP_PORT:-8888}
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-changemeinproduction}
      
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-coach_ai}
      DB_USER: ${DB_USER:-coach_ai_user}
      DB_PASSWORD: ${DB_PASSWORD:-coach_ai_password}
      DB_CHARSET: ${DB_CHARSET:-utf8mb4}
      
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispassword}
      REDIS_DB: ${REDIS_DB:-0}
      
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jwtsecretkeychangeme}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE: ${LOG_FILE:-/var/log/coach-ai/app.log}
      
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      UPLOAD_MAX_SIZE: ${UPLOAD_MAX_SIZE:-10485760}
      
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_DEFAULT: ${RATE_LIMIT_DEFAULT:-100/hour}
      
      EVENT_BUS_TYPE: ${EVENT_BUS_TYPE:-memory}
    ports:
      - "${APP_PORT:-8888}:8888"
    volumes:
      - app_logs:/var/log/coach-ai
      - app_uploads:/app/uploads
      - ./src:/app/src
    command: >
      sh -c "
        echo '等待数据库就绪...' &&
        sleep 10 &&
        echo '运行数据库迁移...' &&
        python -c '
from src.infrastructure.db.connection import init_database
from src.infrastructure.db.migrations import run_migrations

try:
    db_manager = init_database()
    run_migrations(db_manager)
    print(\"数据库迁移完成\")
except Exception as e:
    print(f\"数据库迁移失败: {e}\")
        ' &&
        echo '启动应用...' &&
        python src/main.py
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - coach-ai-network

  # Nginx反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: coach-ai-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./deploy/nginx/ssl:/etc/nginx/ssl
      - app_logs:/var/log/nginx
    networks:
      - coach-ai-network

  # 监控服务（可选）
  monitor:
    image: grafana/grafana:latest
    container_name: coach-ai-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./deploy/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - coach-ai-network

  # 数据库管理（可选）
  adminer:
    image: adminer:latest
    container_name: coach-ai-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    networks:
      - coach-ai-network

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local
  app_logs:
    driver: local
  app_uploads:
    driver: local
  grafana_data:
    driver: local

networks:
  coach-ai-network:
    driver: bridge
    name: coach-ai-network